interval: 3
hosts:
  - name: "localhost"
    address: "localhost"
    socket_path: "/run/user/${UID}/podman/podman.sock"
  - name: "Example Remote"
    address: "0.0.0.0"
    user: "user"
    private_key_path: "$HOME/.ssh/id_rsa"
    remote_socket_path: "/run/user/${UID}/podman/podman.sock"
    local_socket_path: "/tmp/sealboard-remote1.sock"
    ssh_port: 22

